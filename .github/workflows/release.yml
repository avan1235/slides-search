name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Extract version name
        id: extract_name
        run: echo "name=$(echo ${GITHUB_REF##*/})" >>$GITHUB_OUTPUT
        shell: bash

      - name: Create release
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          name: Release ${{ steps.extract_name.outputs.name }}

  build-desktop:
    name: Build desktop release
    strategy:
      matrix:
        platform: [ ubuntu-latest, windows-latest, macos-latest ]
    runs-on: ${{ matrix.platform }}
    needs: release
    steps:
      - name: Checkout to push branch
        uses: actions/checkout@v2
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Extract version from tag
        uses: damienaicheh/extract-version-from-tag-action@v1.1.0

      - name: Set up JDK 21
        uses: actions/setup-java@v1
        with:
          java-version: 21

      - name: Build distribution file
        if: job.status == 'success'
        run: |
          export GRADLE_USER_HOME=$(pwd)/.gradle
          chmod +x ./gradlew
          ./gradlew desktopApp:packageDistributionForCurrentOS
        shell: bash
        env:
          VERSION: ${{ env.MAJOR }}.${{ env.MINOR }}.${{ env.PATCH }}

      - name: Upload deb artifact file to workflow run results
        uses: actions/upload-artifact@v4
        if: runner.os == 'Linux'
        with:
          name: SlidesSearch-${{ env.MAJOR }}.${{ env.MINOR }}.${{ env.PATCH }}.deb
          path: desktopApp/build/compose/binaries/main/deb/slidessearch_${{ env.MAJOR }}.${{ env.MINOR }}.${{ env.PATCH }}_amd64.deb

      - name: Upload deb artifact file to release
        uses: actions/upload-release-asset@v1
        if: runner.os == 'Linux'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: ./desktopApp/build/compose/binaries/main/deb/slidessearch_${{ env.MAJOR }}.${{ env.MINOR }}.${{ env.PATCH }}_amd64.deb
          asset_name: SlidesSearch-${{ env.MAJOR }}.${{ env.MINOR }}.${{ env.PATCH }}.deb
          asset_content_type: application/x-deb

      - name: Upload msi installer file to workflow run results
        uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: SlidesSearch-${{ env.MAJOR }}.${{ env.MINOR }}.${{ env.PATCH }}.msi
          path: desktopApp/build/compose/binaries/main/msi/SlidesSearch-${{ env.MAJOR }}.${{ env.MINOR }}.${{ env.PATCH }}.msi

      - name: Upload msi installer file to release
        uses: actions/upload-release-asset@v1
        if: runner.os == 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: ./desktopApp/build/compose/binaries/main/msi/SlidesSearch-${{ env.MAJOR }}.${{ env.MINOR }}.${{ env.PATCH }}.msi
          asset_name: SlidesSearch-${{ env.MAJOR }}.${{ env.MINOR }}.${{ env.PATCH }}.msi
          asset_content_type: application/x-ms-dos-executable

      - name: Upload dmg image file to workflow run results
        uses: actions/upload-artifact@v4
        if: runner.os == 'macOS'
        with:
          name: SlidesSearch-${{ env.MAJOR }}.${{ env.MINOR }}.${{ env.PATCH }}.dmg
          path: desktopApp/build/compose/binaries/main/dmg/SlidesSearch-${{ env.MAJOR }}.${{ env.MINOR }}.${{ env.PATCH }}.dmg

      - name: Upload dmg image file to release
        uses: actions/upload-release-asset@v1
        if: runner.os == 'macOS'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: ./desktopApp/build/compose/binaries/main/dmg/SlidesSearch-${{ env.MAJOR }}.${{ env.MINOR }}.${{ env.PATCH }}.dmg
          asset_name: SlidesSearch-${{ env.MAJOR }}.${{ env.MINOR }}.${{ env.PATCH }}.dmg
          asset_content_type: application/octet-stream
